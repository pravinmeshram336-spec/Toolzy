<div class="age-container">

<h1>🧩 JSON Formatter</h1>

<p>Paste your JSON below.</p>

<textarea
id="jsonInput"
rows="12"
placeholder="Paste JSON here..."
style="width:100%;padding:15px;border-radius:10px;"></textarea>

<br><br>

<button onclick="formatJSON()">
Format JSON
</button>

<button onclick="clearJSON()">
Clear
</button>

<button onclick="copyJSON()">
Copy
</button>

<br><br>

<textarea
id="jsonOutput"
rows="12"
readonly
placeholder="Formatted JSON..."
style="width:100%;padding:15px;border-radius:10px;"></textarea>

</div>

<script src="json-formatter.js"></script>

</body>
