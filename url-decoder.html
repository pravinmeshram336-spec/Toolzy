<h1>🔗 URL Decoder</h1>

<p>Paste encoded URL below</p>

<textarea
id="inputText"
rows="8"
placeholder="Paste encoded URL..."
style="width:100%;padding:15px;border-radius:10px;"></textarea>

<br><br>

<button onclick="decodeURL()">Decode</button>

<button onclick="clearText()">Clear</button>

<button onclick="copyText()">Copy</button>

<br><br>

id="outputText"
rows="8"
readonly
placeholder="Decoded URL..."
style="width:100%;padding:15px;border-radius:10px;"></textarea>
