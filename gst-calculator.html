<div class="age-container">

<h1>💰 GST Calculator</h1>

<p>Enter Amount and GST Rate</p>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="gstRate">

<option value="3">3% GST</option>
<option value="5">5% GST</option>
<option value="12">12% GST</option>
<option value="18" selected>18% GST</option>
<option value="28">28% GST</option>

</select>

<button id="addGST">Add GST</button>

<button id="removeGST">Remove GST</button>

<div class="result">

<h2>Result</h2>

<p id="gstAmount">GST Amount : --</p>

<p id="finalAmount">Final Amount : --</p>

</div>

<button id="resetBtn">Reset</button>

</div>

<script src="gst-calculator.js"></script>
