<div class="age-container">

<h1>📋 Text Sorter</h1>

<p>Enter one item per line</p>

<textarea id="text"
placeholder="Apple
Banana
Cat
Dog"
style="width:100%;height:220px;padding:15px;background:#202020;color:white;border:1px solid #333;border-radius:10px;font-size:17px;"></textarea>

<button onclick="sortAZ()">Sort A → Z</button>

<button onclick="sortZA()">Sort Z → A</button>

<div class="result">

<h2>Sorted Result</h2>

<textarea id="output"
style="width:100%;height:220px;padding:15px;background:#202020;color:white;border:1px solid #333;border-radius:10px;font-size:17px;"></textarea>

</div>

</div>

<script src="text-sorter.js"></script>
