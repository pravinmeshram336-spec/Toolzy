<div class="age-container">

<h1>📝 Word Counter</h1>

<p>Enter your text below</p>

<textarea id="text"
placeholder="Type or paste your text here..."
style="width:100%;height:220px;padding:15px;background:#202020;color:white;border:1px solid #333;border-radius:10px;font-size:17px;"></textarea>

<button onclick="countWords()">Count</button>

<div class="result">

<h2>Result</h2>

<p>Words: <span id="words">0</span></p>

<p>Characters: <span id="characters">0</span></p>

<p>Characters (No Spaces): <span id="nospace">0</span></p>

</div>

</div>
