<div class="age-container">

<h1>🖼️ Image Resizer</h1>

<p>Select an image</p>

<input type="file" id="imageInput" accept="image/*">

<input type="number" id="width" placeholder="Width (px)">

<input type="number" id="height" placeholder="Height (px)">

<button onclick="resizeImage()">Resize Image</button>

<canvas id="canvas" style="display:none;"></canvas>

<div class="result">

<h2>Preview</h2>

<img id="preview" style="max-width:100%;display:none;border-radius:10px;">

<br><br>

<a id="downloadBtn" style="display:none;" download="resized-image.png">
<button>Download Image</button>
</a>

</div>

</div>

<script src="image-resizer.js"></script>

</body>
</html>
