<body>

<div class="age-container">

<h1>🖼️ JPG to PNG</h1>

<input type="file" id="imageInput" accept=".jpg,.jpeg,image/jpeg">

<button onclick="convertToPNG()">Convert to PNG</button>

<canvas id="canvas" style="display:none;"></canvas>

<div class="result">

<h2>Preview</h2>

<img id="preview" style="display:none;max-width:100%;border-radius:10px;">

<br><br>

<a id="downloadBtn" download="converted.png" style="display:none;">
<button>Download PNG</button>
</a>

</div>

</div>

<script src="jpg-to-png.js"></script>

</body>
